backend:
  name: github
  repo: xiaokang2345-svg/myblog # 替换为您的 GitHub 仓库
  branch: main # 或 master
  site_domain: https://kaimaoxing.com # 您的域名
  base_url: https://kaimaoxing.com # 用于 OAuth 回调
  auth_endpoint: /admin/auth # Vercel 重写规则需要

media_folder: "static/uploads" # 上传图片存储路径
public_folder: "/uploads" # 公共访问路径

collections:
  - name: "blog"
    label: "Blog"
    folder: "content/posts"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Body", name: "body", widget: "markdown"}
