backend:
  name: github
  repo: xiaokang2345-svg/myblog  # ←【必改】替换为你的GitHub仓库（例：kaimaoxing/kaimaoxing.com）
  branch: main                        # ←【必改】确认你的默认分支（main 或 master）
  auth_endpoint: /api/auth            # 安全代理路径（关键！）
  site_domain: https://kaimaoxing.com
  base_url: https://kaimaoxing.com

media_folder: "static/uploads"        # 上传图片存储路径
public_folder: "/uploads"             # 网站访问路径

collections:
  - name: "posts"
    label: "博客文章"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "发布日期", name: "date", widget: "datetime"}
      - {label: "草稿", name: "draft", widget: "boolean", default: false}
